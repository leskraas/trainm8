# Documented example: https://github.com/superfly/litefs/blob/dec5a7353292068b830001bd2df4830e646f6a2f/cmd/litefs/etc/litefs.yml
fuse:
  # Required. This is the mount directory that applications will
  # use to access their SQLite databases.
  dir: '${LITEFS_DIR}'

data:
  # Path to internal data storage.
  dir: '/data/litefs'

proxy:
  # matches the internal_port in fly.toml
  addr: ':${INTERNAL_PORT}'
  target: 'localhost:${PORT}'
  db: '${DATABASE_FILENAME}'

# The lease section specifies how the cluster will be managed. This is a
# single-node app, so we use a "static" lease: this machine is always the
# primary, with no external leader-election dependency.
#
# We moved off the "consul" lease because Fly's hosted Consul for this app
# wedged ("No cluster leader" 500s), leaving LiteFS unable to hold a stable
# primary lease — it flapped acquire/lose endlessly, so the LiteFS proxy on
# :8080 never settled and deploys timed out waiting for health checks. A static
# lease has no such dependency and makes this node primary immediately on boot.
# If this app is ever scaled to multiple machines/regions, switch back to a
# consul lease so the primary can move dynamically.
lease:
  type: 'static'
  candidate: true
  advertise-url: 'http://${HOSTNAME}.vm.${FLY_APP_NAME}.internal:20202'

exec:
  - cmd: npx prisma migrate deploy
    if-candidate: true

  # Set the journal mode for the database to WAL. This reduces concurrency deadlock issues
  - cmd: sqlite3 $DATABASE_PATH "PRAGMA journal_mode = WAL;"
    if-candidate: true

  # Set the journal mode for the cache to WAL. This reduces concurrency deadlock issues
  - cmd: sqlite3 $CACHE_DATABASE_PATH "PRAGMA journal_mode = WAL;"
    if-candidate: true

  # Generate Typed SQL files
  - cmd: npx prisma generate --sql

  - cmd: npm start
